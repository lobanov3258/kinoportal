<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Плеер - КиноПортал</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            overflow: hidden;
        }

        #playerContainer {
            width: 100vw;
            height: 100vh;
        }

        .video-player {
            position: relative;
            width: 100%;
            height: 100%;
            background: #000;
        }

        .video-element {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .player-loading {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .player-center-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: none;
        }

        .center-play-icon {
            width: 80px;
            height: 80px;
            background: rgba(229, 9, 20, 0.9);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 32px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .center-play-icon:hover {
            transform: scale(1.1);
            background: rgba(229, 9, 20, 1);
        }

        .player-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.9));
            padding: 20px;
            transition: opacity 0.3s;
        }

        .progress-bar {
            width: 100%;
            height: 5px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 3px;
            margin-bottom: 15px;
            cursor: pointer;
            position: relative;
        }

        .progress-filled {
            height: 100%;
            background: var(--primary-color);
            border-radius: 3px;
            width: 0%;
            transition: width 0.1s;
        }

        .progress-handle {
            position: absolute;
            top: 50%;
            left: 0%;
            width: 15px;
            height: 15px;
            background: white;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .progress-bar:hover .progress-handle {
            opacity: 1;
        }

        .controls-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .controls-left,
        .controls-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .control-btn {
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 4px;
            transition: background 0.3s;
        }

        .control-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .volume-control {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .volume-slider {
            width: 0;
            overflow: hidden;
            transition: width 0.3s;
        }

        .volume-control:hover .volume-slider {
            width: 100px;
        }

        .volume-slider input {
            width: 100%;
        }

        .time-display {
            color: white;
            font-size: 14px;
        }

        .quality-selector {
            position: relative;
        }

        .quality-menu {
            position: absolute;
            bottom: 100%;
            right: 0;
            background: rgba(0, 0, 0, 0.95);
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 10px;
            display: none;
        }

        .quality-menu.active {
            display: block;
        }

        .quality-option {
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 4px;
            white-space: nowrap;
        }

        .quality-option:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .quality-option.active {
            background: var(--primary-color);
        }

        .player-info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            transition: opacity 0.3s;
        }

        .player-info h2 {
            margin-bottom: 10px;
        }

        .player-meta {
            display: flex;
            gap: 15px;
            font-size: 14px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div id="playerContainer"></div>

    <script src="../api/movies-data.js"></script>
    <script src="../js/player.js"></script>
    <script>
        // Получить ID фильма из URL
        const urlParams = new URLSearchParams(window.location.search);
        const movieId = parseInt(urlParams.get('id'));

        if (movieId) {
            initPlayer(movieId, 'playerContainer');
        } else {
            document.body.innerHTML = '<div style="color: white; text-align: center; padding: 50px;"><h1>Фильм не найден</h1><a href="../index.html" style="color: #e50914;">Вернуться на главную</a></div>';
        }
    </script>
</body>
</html>
