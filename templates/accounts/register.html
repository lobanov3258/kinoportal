{% extends 'base.html' %}

{% block title %}Регистрация - КиноПортал{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <h1 class="auth-title">Регистрация</h1>
        <p class="auth-subtitle">Создайте бесплатный аккаунт</p>
        
        {% if messages %}
            {% for message in messages %}
            <div class="auth-error">{{ message }}</div>
            {% endfor %}
        {% endif %}
        
        <form method="post" class="auth-form">
            {% csrf_token %}
            <div class="form-group">
                <label>Имя пользователя</label>
                <input type="text" name="username" placeholder="Придумайте логин" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="Ваш email" required>
            </div>
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" name="password" placeholder="Придумайте пароль" required>
            </div>
            <div class="form-group">
                <label>Подтверждение пароля</label>
                <input type="password" name="password2" placeholder="Повторите пароль" required>
            </div>
            <button type="submit" class="btn-auth">Зарегистрироваться</button>
        </form>
        
        <p class="auth-footer">
            Уже есть аккаунт? <a href="{% url 'login' %}">Войти</a>
        </p>
    </div>
</div>
{% endblock %}
